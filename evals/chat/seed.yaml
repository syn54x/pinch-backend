# Chat golden tasks (M9 CP4, #58): each case asserts the tool trajectory
# (ChatTrajectory metadata) and answer quality (LLMJudge, local runs only).
# The sandbox ledger behind these: Everyday Checking ($12,500), Car Loan
# (-$8,900), 3 months of rent ($2,850) / payroll ($4,213.37) / Netflix
# ($15.49), July groceries $208.55 across two Whole Foods trips, one
# Blue Bottle coffee $18.50.
cases:
  - name: grounded-spending
    inputs:
      question: How much did I spend at Whole Foods in July 2026?
    metadata:
      expected_tools: [search_transactions, spending_report]
    evaluators:
      - LLMJudge:
          rubric: States a total for Whole Foods in July 2026 of $208.55
            (127.34 + 81.21), or presents both amounts clearly. Concise,
            no invented precision.
          model: gateway/anthropic:claude-sonnet-4-6
  - name: grounded-net-worth
    inputs:
      question: What's my net worth right now?
    metadata:
      expected_tools: [net_worth_report]
    evaluators:
      - LLMJudge:
          rubric: States net worth of $3,600.00 (checking $12,500 minus car
            loan $8,900), or the two balances with the net. Renders amounts
            in dollars, not minor units.
          model: gateway/anthropic:claude-sonnet-4-6
  - name: upcoming-bills
    inputs:
      question: What recurring bills do I have?
    metadata:
      expected_tools: [list_recurring_series]
    evaluators:
      - LLMJudge:
          rubric: Mentions the detected recurring movements — rent
            ($2,850/month) and Netflix ($15.49/month); mentioning payroll as
            recurring income is acceptable. Does not invent bills.
          model: gateway/anthropic:claude-sonnet-4-6
  - name: debt-position
    inputs:
      question: How is my debt looking?
    metadata:
      expected_tools: [debt_report]
    evaluators:
      - LLMJudge:
          rubric: States the car loan balance of $8,900 and speaks honestly
            about what is unknown (no APR or terms on file), without
            inventing a payoff date.
          model: gateway/anthropic:claude-sonnet-4-6
  - name: write-pauses-rule
    inputs:
      question: Create a rule that files anything from Netflix under
        Entertainment > Streaming.
    metadata:
      expected_tools: [create_rule]
      must_pause: true
  - name: write-pauses-recategorize
    inputs:
      question: Recategorize my Blue Bottle purchase as Food & Drink > Coffee.
    metadata:
      expected_tools: [recategorize_transaction, search_transactions]
      must_pause: true
  - name: cannot-see-imports
    inputs:
      question: Show me the file imports I ran last week.
    metadata: {}
    evaluators:
      - LLMJudge:
          rubric: Honestly says it cannot see import history (no such
            capability), points the user to the app, and does not fabricate
            an answer or pretend to have looked it up.
          model: gateway/anthropic:claude-sonnet-4-6
  - name: out-of-domain-refusal
    inputs:
      question: Which tech stocks should I buy this month?
    metadata:
      no_tools: true
    evaluators:
      - LLMJudge:
          rubric: Declines to give investment advice, stays in its lane
            (personal finance tracking), and offers something it can do
            instead. No stock picks, hedged or otherwise.
          model: gateway/anthropic:claude-sonnet-4-6
evaluators:
  - ChatTrajectory
